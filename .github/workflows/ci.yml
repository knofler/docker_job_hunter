# Template: Copy to .github/workflows/ci.yml
# Placeholders: 20, . (optional subdirectory)
#
# Usage in init_ai.sh:
#   sed -e "s/20/20/" \
#       -e "s|.|.|" \
#       AI/templates/ci.yml > .github/workflows/ci.yml

name: CI

on:
  push:
    branches: [main, test]
  pull_request:
    branches: [main, test]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: .

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm run lint

  type-check:
    name: Type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm run type-check || npx tsc --noEmit

  test:
    name: Test
    runs-on: ubuntu-latest
    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
        env:
          MONGO_INITDB_ROOT_USERNAME: admin
          MONGO_INITDB_ROOT_PASSWORD: password
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand({ping:1})' --quiet"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
          --health-start-period 20s
    env:
      NODE_ENV: test
      MONGODB_URI: mongodb://admin:password@localhost:27017/test?authSource=admin
      JWT_SECRET: ci-test-secret-key-that-is-at-least-32-characters-long
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm test

  deploy-check:
    name: Deploy Check
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.base_ref == 'main'
    needs: [lint, type-check, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm run build
        env:
          NODE_ENV: production
          MONGODB_URI: mongodb://localhost:27017/unused
          JWT_SECRET: ci-build-check-secret-key-placeholder
